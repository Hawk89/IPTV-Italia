name: Sync and Modify

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  sync-and-modify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
           token: ${{ secrets.GITHUB_TOKEN }}
        env:
           FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Sync with Upstream
        run: |
          gh repo sync ${{ github.repository }} --branch main --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update M3U URLs
        run: |
          sed -i 's/\r$//' prova.m3u
          
          while IFS= read -r line; do
            if [[ $line =~ ^http ]]; then
              echo "Processing: $line" >&2
              final_url=$(curl -L -s -o /dev/null -w %{url_effective} --http1.1 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "$line") || { echo "Failed to fetch: $line" >&2; final_url="$line"; }
              echo "$final_url"
            else
              echo "$line"
            fi
          done < prova.m3u > ipradioita_new.m3u
          
          # Confirm file creation
          if [ -f ipradioita_new.m3u ]; then
            echo "File created successfully"
            ls -la ipradioita_new.m3u
          else
            echo "File creation failed"
            exit 1
          fi
        shell: bash

      - name: Modify ipradioita_new.m3u
        run: |
          if [ -f "ipradioita_new.m3u" ]; then
            sed -i -E 's/(#EXTINF:[^,]*,)/\1 group-title="Radio" radio="true",/' ipradioita_new.m3u
          fi

      - name: Commit Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the modified file
          git add ipradioita_new.m3u
          # Commit the change (if there was a modification)
          git commit -m "Modify prova2.m3u" || echo "No changes to commit"
          
          # Now fetch and rebase
          git fetch origin main
          git rebase origin/main
          
          git push --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
