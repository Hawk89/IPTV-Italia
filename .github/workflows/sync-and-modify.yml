name: Sync and Modify

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  sync-and-modify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
           token: ${{ secrets.GITHUB_TOKEN }}
        env:
           FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Sync with Upstream
        run: |
          gh repo sync ${{ github.repository }} --branch main --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Modify ipradioita.m3u
        run: |
          if [ -f "ipradioita.m3u" ]; then
            sed -i -E 's/(#EXTINF:[^,]*,)/\1 group-title="Radio" radio="true",/' ipradioita.m3u
          fi

      - name: Commit Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Fetch the latest changes that gh repo sync pulled
          git fetch origin main
          # Rebase our changes onto the updated main branch
          git rebase origin/main
          git add ipradioita.m3u
          git commit -m "Modify ipradioita.m3u" || echo "No changes to commit"
          git push
