name: Sync and Modify

on:
  schedule:
    - cron: '0 6 * * *' 
  workflow_dispatch:

jobs:
  sync-and-modify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
           token: ${{ secrets.GITHUB_TOKEN }}
        env:
           FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Checkout specific file from Upstream
        uses: actions/checkout@v4
        with:
          repository: 'Tundrak/IPTV-Italia' 
          ref: 'main'
          path: 'upstream-repo'
          sparse-checkout: |
            ipradioita.m3u
            iptvitaplus.m3u
            iptvita.m3u
            
      - name: Copy upstream files to root
        run: |
          cp upstream-repo/ipradioita.m3u .
          cp upstream-repo/iptvitaplus.m3u .
          cp upstream-repo/iptvita.m3u .
          rm -rf upstream-repo
          # Stage the updated files
          git add ipradioita.m3u iptvitaplus.m3u iptvita.m3u
          
      - name: Commit Changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Only commit if there are changes
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Update M3U files from upstream"
            git push
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update M3U URLs
        run: |
        
          while IFS= read -r line; do
            if [[ $line =~ ^http ]]; then
              echo "Processing: $line" >&2
              final_url=$(curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -L -s -o /dev/null -w %{url_effective} --max-time 5 "$line") || { echo "Failed to fetch: $line" >&2; final_url="$line"; }
              echo "$final_url"
            else
              echo "$line"
            fi
          done < <(sed 's/\r$//' ipradioita.m3u) > rit.m3u
          
          # Confirm file creation
          if [ -f rit.m3u ]; then
            echo "File created successfully"
            ls -la rit.m3u
          else
            echo "File creation failed"
            exit 1
          fi
        shell: bash

      - name: Modify rit.m3u
        run: |
          if [ -f "rit.m3u" ]; then
            sed -i -E 's/(#EXTINF:[^,]*,)/\1group-title="radio" radio="true",/' rit.m3u
          fi

      - name: Commit and push the new file
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Scarica il file M3U esterno (es. dalla tua URL)
          curl -L -o "tvita.m3u" "https://davidefulgione.it/tv.m3u"
          
          # Stage the modified file
          git add rit.m3u tvita.m3u
          # Commit the change (if there was a modification)
          git commit -m "Modify rit.m3u and add external m3u" || echo "No changes to commit"
          
          # See what Git considers "unstaged"
          git status
          
          git fetch origin main
          git rebase origin/main
          git push --force-with-lease
